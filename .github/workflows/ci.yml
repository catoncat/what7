name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Node 24 / npm verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Verify backend and worker
        run: npm run verify

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Build web app
        run: npm --prefix web run build
